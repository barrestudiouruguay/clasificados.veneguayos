<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://unpkg.com https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle · Clasificados VeneGuayos</title>
<meta name="description" content="Portal de empleos para venezolanos y migrantes en Uruguay.">
<meta property="og:title" content="Detalle · Clasificados VeneGuayos">
<meta property="og:image" content="assets/logo-mark.svg">
<link rel="stylesheet" href="css/main.css">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>

<script src="js/app.js"></script>
</head>
<body>
<div id="hdr"></div>
<div style="max-width:760px;margin:0 auto;padding:36px 24px 64px;">
  <a href="empleos.html" style="color:var(--humo);text-decoration:none;font-size:13px;display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;font-family:var(--f-archivo);font-weight:600;">← Volver a empleos</a>
  <div id="detail"><div class="empty-state"><div class="es-icon">⏳</div><p>Cargando…</p></div></div>
</div>
<div id="ftr"></div>
<script>
document.getElementById('hdr').innerHTML = renderHeader('empleos.html');
document.getElementById('ftr').innerHTML = renderFooter();

async function loadDetail() {
  const id = new URLSearchParams(location.search).get('id');
  if(!id){location.href='empleos.html';return;}
  try {
    const {data:j,error} = await getSupabase().from('empleos').select('*').eq('id',id).single();
    if(error||!j) throw error;
    cacheJob(j);
    document.title = j.titulo + ' · Clasificados VeneGuayos';
    const uid = 'detail_' + j.id;
    const hasContact = j.contacto_email || j.contacto_wa;
    document.getElementById('detail').innerHTML = `
      <div class="job-card" style="cursor:default;">
        <div class="job-card-top-bar"></div>
        <div class="job-card-body" style="padding:28px 32px 32px;">
          <div class="job-card-head">
            ${rubroChip(j.categoria)}
            <div style="display:flex;gap:6px;">
              ${j.urgente?'<span class="badge-destacado">URGENTE</span>':''}
              ${isNew(j.created_at)?'<span class="badge-nuevo">NUEVO</span>':''}
            </div>
          </div>
          <h1 style="font-family:var(--f-archivo);font-weight:800;font-size:clamp(24px,4vw,34px);letter-spacing:-.02em;color:var(--tinta);line-height:1.05;margin:14px 0 6px;">${j.titulo}</h1>
          <div style="font-size:16px;font-weight:600;color:var(--piedra);margin-bottom:20px;">En <strong style="color:var(--tinta);">${j.empresa}</strong> · Publicado ${timeAgo(j.created_at)}</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;">
            <div style="background:var(--niebla);padding:14px;border-radius:var(--r-m);text-align:center;">
              <div style="font-family:var(--f-archivo);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:4px;">Sueldo</div>
              <div style="font-family:var(--f-archivo);font-weight:800;color:var(--vino);font-size:17px;">${j.sueldo||'A convenir'}</div>
              ${j.sueldo_nota?`<div style="font-size:11px;color:var(--humo);">${j.sueldo_nota}</div>`:''}
            </div>
            <div style="background:var(--niebla);padding:14px;border-radius:var(--r-m);text-align:center;">
              <div style="font-family:var(--f-archivo);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:4px;">Jornada</div>
              <div style="font-weight:700;font-size:14px;color:var(--tinta);">${j.tipo_jornada}</div>
            </div>
            <div style="background:var(--niebla);padding:14px;border-radius:var(--r-m);text-align:center;">
              <div style="font-family:var(--f-archivo);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:4px;">Zona</div>
              <div style="font-weight:700;font-size:14px;color:var(--tinta);">${j.zona}${j.barrio?', '+j.barrio:''}</div>
            </div>
            ${j.horario?`<div style="background:var(--niebla);padding:14px;border-radius:var(--r-m);text-align:center;"><div style="font-family:var(--f-archivo);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:4px;">Horario</div><div style="font-weight:700;font-size:13px;color:var(--tinta);">${j.horario}</div></div>`:''}
          </div>
          ${j.descripcion?`<div style="margin-bottom:20px;"><div style="font-family:var(--f-archivo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:10px;">Descripción</div><p style="font-size:15px;line-height:1.7;color:var(--tinta);white-space:pre-wrap;">${j.descripcion}</p></div>`:''}
          ${j.requisitos?`<div style="margin-bottom:20px;"><div style="font-family:var(--f-archivo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--humo);margin-bottom:10px;">Requisitos</div><p style="font-size:15px;line-height:1.7;color:var(--tinta);white-space:pre-wrap;">${j.requisitos}</p></div>`:''}
          <hr style="border:none;border-top:1px solid var(--linea);margin:24px 0;">
          ${hasContact?`<div id="wrap_${uid}"><button class="contact-reveal-btn" onclick="revealContact('${uid}',${j.id})">${IconGlobe} Ver datos de contacto</button></div>`:''}
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('detail').innerHTML = '<div class="empty-state"><div class="es-icon">⚠️</div><h3>No encontrado</h3><p><a href="empleos.html" style="color:var(--azul);">Ver todos los empleos</a></p></div>';
  }
}
loadDetail();
</script>
<script src="js/photos.js"></script>
</body></html>
